# CPPLINT configuration file for toller project
# Configured for K&R coding style

# Disable Google style rules that conflict with K&R style
set nochange=true

# Filter out rules incompatible with K&R style
filter=-google-readability-braces-around-statements
filter=-google-build-using-namespace
filter=-google-runtime-int
filter=-google-runtime-references
filter=-whitespace/indent
filter=-whitespace/braces
filter=-whitespace/newline
filter=-whitespace/tab
filter=-build/include_order
filter=-build/header_guard
filter=-readability/nolint
filter=-readability/todo
filter=-runtime/string
